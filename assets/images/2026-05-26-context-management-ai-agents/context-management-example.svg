<svg width="960" height="420" viewBox="0 0 960 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="420" fill="#F8F9FC" rx="12"/>

  <!-- ── PHASE 1: Research ─────────────────────────────────────────── -->
  <rect x="20" y="20" width="280" height="380" rx="12" fill="#FFFFFF" stroke="#E0E4ED" stroke-width="1.5"/>
  <rect x="20" y="20" width="280" height="44" rx="12" fill="#EEF2FF"/>
  <rect x="20" y="52" width="280" height="12" fill="#EEF2FF"/>
  <text x="160" y="48" text-anchor="middle" font-size="14" font-weight="600" fill="#4A5DCC">Phase 1 · Research</text>

  <!-- Context bar label -->
  <text x="36" y="86" font-size="11" fill="#888">Context window</text>
  <!-- Bar background -->
  <rect x="36" y="92" width="248" height="14" rx="7" fill="#F0F0F0"/>
  <!-- Bar fill ~78% — warning orange -->
  <rect x="36" y="92" width="193" height="14" rx="7" fill="#F5A623"/>
  <text x="284" y="103" text-anchor="end" font-size="10" fill="#F5A623" font-weight="600">78%</text>

  <!-- Divider -->
  <line x1="36" y1="118" x2="284" y2="118" stroke="#EAEAEA" stroke-width="1"/>

  <!-- Explored approaches label -->
  <text x="36" y="137" font-size="11" fill="#888">Explored approaches</text>

  <!-- Approach 1: Streaming — rejected -->
  <rect x="36" y="145" width="248" height="44" rx="8" fill="#FFF5F5" stroke="#FCCCC8" stroke-width="1"/>
  <text x="56" y="163" font-size="12" fill="#C0392B">✕</text>
  <text x="72" y="163" font-size="12" font-weight="500" fill="#C0392B">Streaming response</text>
  <text x="72" y="178" font-size="10" fill="#999">High memory, timeouts on large data</text>

  <!-- Approach 2: JSON — rejected -->
  <rect x="36" y="197" width="248" height="44" rx="8" fill="#FFF5F5" stroke="#FCCCC8" stroke-width="1"/>
  <text x="56" y="215" font-size="12" fill="#C0392B">✕</text>
  <text x="72" y="215" font-size="12" font-weight="500" fill="#C0392B">JSON export</text>
  <text x="72" y="230" font-size="10" fill="#999">Too verbose for volume, hard to open</text>

  <!-- Approach 3: CSV + S3 — chosen -->
  <rect x="36" y="249" width="248" height="44" rx="8" fill="#F0FFF4" stroke="#82D9A8" stroke-width="1.5"/>
  <text x="56" y="267" font-size="12" fill="#27AE60">✓</text>
  <text x="72" y="267" font-size="12" font-weight="600" fill="#27AE60">CSV + S3 + signed URL</text>
  <text x="72" y="282" font-size="10" fill="#555">Background job, efficient, user-friendly</text>

  <!-- Pagination — deferred -->
  <rect x="36" y="301" width="248" height="36" rx="8" fill="#FFFDF0" stroke="#F0D9A0" stroke-width="1"/>
  <text x="56" y="322" font-size="11" fill="#B7860B">⏸</text>
  <text x="72" y="322" font-size="11" fill="#B7860B">Pagination — deferred</text>

  <!-- Context noise note -->
  <rect x="36" y="345" width="248" height="40" rx="8" fill="#F8F0FF" stroke="#D9B8F0" stroke-width="1"/>
  <text x="160" y="360" text-anchor="middle" font-size="10" fill="#8E44AD">All 4 directions in context —</text>
  <text x="160" y="374" text-anchor="middle" font-size="10" fill="#8E44AD">dead ends and chosen path alike</text>

  <!-- ── ARROW 1 ────────────────────────────────────────────────────── -->
  <g>
    <line x1="314" y1="210" x2="348" y2="210" stroke="#A0AAC8" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="331" y="204" text-anchor="middle" font-size="9" fill="#A0AAC8">write</text>
    <text x="331" y="223" text-anchor="middle" font-size="9" fill="#A0AAC8">files</text>
  </g>

  <!-- ── CONTEXT FILES (middle) ─────────────────────────────────────── -->
  <rect x="354" y="20" width="252" height="380" rx="12" fill="#FFFFFF" stroke="#E0E4ED" stroke-width="1.5"/>
  <rect x="354" y="20" width="252" height="44" rx="12" fill="#EEF2FF"/>
  <rect x="354" y="52" width="252" height="12" fill="#EEF2FF"/>
  <text x="480" y="48" text-anchor="middle" font-size="14" font-weight="600" fill="#4A5DCC">Context Files</text>

  <!-- File cards -->
  <rect x="370" y="76" width="220" height="46" rx="8" fill="#F5F7FF" stroke="#C8D0F0" stroke-width="1"/>
  <text x="388" y="97" font-size="11" fill="#7B68EE">📄</text>
  <text x="406" y="97" font-size="12" font-weight="600" fill="#4A5DCC">requirement.md</text>
  <text x="406" y="112" font-size="10" fill="#888">Precise, clarified scope</text>

  <rect x="370" y="130" width="220" height="46" rx="8" fill="#F5F7FF" stroke="#C8D0F0" stroke-width="1"/>
  <text x="388" y="151" font-size="11" fill="#7B68EE">📄</text>
  <text x="406" y="151" font-size="12" font-weight="600" fill="#4A5DCC">architecture.md</text>
  <text x="406" y="166" font-size="10" fill="#888">CSV + S3 approach &amp; rationale</text>

  <rect x="370" y="184" width="220" height="46" rx="8" fill="#F5F7FF" stroke="#C8D0F0" stroke-width="1"/>
  <text x="388" y="205" font-size="11" fill="#7B68EE">📄</text>
  <text x="406" y="205" font-size="12" font-weight="600" fill="#4A5DCC">data.md</text>
  <text x="406" y="220" font-size="10" fill="#888">Fields, types, API shape</text>

  <rect x="370" y="238" width="220" height="46" rx="8" fill="#F5F7FF" stroke="#C8D0F0" stroke-width="1"/>
  <text x="388" y="259" font-size="11" fill="#7B68EE">📄</text>
  <text x="406" y="259" font-size="12" font-weight="600" fill="#4A5DCC">tasks.md</text>
  <text x="406" y="274" font-size="10" fill="#888">8 ordered implementation steps</text>

  <!-- /clear button -->
  <rect x="390" y="302" width="180" height="38" rx="19" fill="#4A5DCC"/>
  <text x="480" y="326" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">/clear</text>

  <text x="480" y="358" text-anchor="middle" font-size="10" fill="#888">Rejected paths, raw research,</text>
  <text x="480" y="372" text-anchor="middle" font-size="10" fill="#888">wrong turns — gone.</text>
  <text x="480" y="388" text-anchor="middle" font-size="10" fill="#888">Files remain.</text>

  <!-- ── ARROW 2 ────────────────────────────────────────────────────── -->
  <g>
    <line x1="620" y1="210" x2="654" y2="210" stroke="#A0AAC8" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="637" y="204" text-anchor="middle" font-size="9" fill="#A0AAC8">load</text>
    <text x="637" y="223" text-anchor="middle" font-size="9" fill="#A0AAC8">files</text>
  </g>

  <!-- ── PHASE 2: Implementation ────────────────────────────────────── -->
  <rect x="660" y="20" width="280" height="380" rx="12" fill="#FFFFFF" stroke="#E0E4ED" stroke-width="1.5"/>
  <rect x="660" y="20" width="280" height="44" rx="12" fill="#EDFFF5"/>
  <rect x="660" y="52" width="280" height="12" fill="#EDFFF5"/>
  <text x="800" y="48" text-anchor="middle" font-size="14" font-weight="600" fill="#27AE60">Phase 2 · Implementation</text>

  <!-- Context bar — clean -->
  <text x="676" y="86" font-size="11" fill="#888">Context window</text>
  <rect x="676" y="92" width="248" height="14" rx="7" fill="#F0F0F0"/>
  <rect x="676" y="92" width="30" height="14" rx="7" fill="#27AE60"/>
  <text x="924" y="103" text-anchor="end" font-size="10" fill="#27AE60" font-weight="600">12%</text>

  <!-- Divider -->
  <line x1="676" y1="118" x2="924" y2="118" stroke="#EAEAEA" stroke-width="1"/>

  <!-- Loaded files list -->
  <text x="676" y="137" font-size="11" fill="#888">Loaded context</text>

  <rect x="676" y="145" width="248" height="32" rx="7" fill="#F0FFF4" stroke="#82D9A8" stroke-width="1"/>
  <text x="694" y="165" font-size="11" fill="#27AE60">📄 requirement.md · architecture.md</text>

  <rect x="676" y="185" width="248" height="32" rx="7" fill="#F0FFF4" stroke="#82D9A8" stroke-width="1"/>
  <text x="694" y="205" font-size="11" fill="#27AE60">📄 data.md · tasks.md</text>

  <!-- Divider -->
  <line x1="676" y1="228" x2="924" y2="228" stroke="#EAEAEA" stroke-width="1"/>

  <!-- What's absent -->
  <text x="676" y="248" font-size="11" fill="#888">Not in context</text>

  <rect x="676" y="256" width="248" height="32" rx="7" fill="#FFF5F5" stroke="#FCCCC8" stroke-width="1"/>
  <text x="694" y="276" font-size="11" fill="#C0392B">✕  Streaming &amp; JSON research</text>

  <rect x="676" y="296" width="248" height="32" rx="7" fill="#FFF5F5" stroke="#FCCCC8" stroke-width="1"/>
  <text x="694" y="316" font-size="11" fill="#C0392B">✕  Deferred pagination discussion</text>

  <rect x="676" y="336" width="248" height="32" rx="7" fill="#FFF5F5" stroke="#FCCCC8" stroke-width="1"/>
  <text x="694" y="356" font-size="11" fill="#C0392B">✕  Raw Q&amp;A from research session</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A0AAC8"/>
    </marker>
  </defs>

</svg>
